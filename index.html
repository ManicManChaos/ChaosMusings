<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1b14" />

  <title>Manic Musings of Chaos</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body class="gateBody">
  <main class="gateWrap" role="main">
    <section class="gateCard" aria-label="Manic Musings of Chaos – Entrance">

      <!-- STAGE (closed → open) -->
      <div class="gateStage" id="gateStage">
        <img
          id="coverClosed"
          class="gateImg isOn"
          src="cover-closed.png"
          alt="Closed spellbook on a stand"
          draggable="false"
        />
        <img
          id="coverOpen"
          class="gateImg"
          src="cover-stand-open.png"
          alt="Spellbook opened, pages glowing"
          draggable="false"
        />

        <!-- Sigil button (translucent) -->
        <button class="sigilBtn" id="sigilBtn" type="button" aria-label="Cast the opening spell">
          <span class="sigilRing" aria-hidden="true"></span>
          <span class="sigilCore" aria-hidden="true"></span>
 <span class="sigilText" aria-label="Earth Fire Water Air">🜃 🜂 🜄 🜁</span>
        </button>

        <!-- Sparkle burst container -->
        <div class="sparkleLayer" id="sparkleLayer" aria-hidden="true"></div>

        <!-- Subtle fade so the “flip” feels cinematic -->
        <div class="gateFade" id="gateFade" aria-hidden="true"></div>
      </div>

      <!-- Title plate -->
      <div class="gateTitlePlate">
        <div class="gateTitle">MANIC MUSINGS<br/>OF CHAOS</div>
        <div class="gateSub">tell no lies</div>
      </div>

    </section>
  </main>

  <script>
    (function () {
      const sigilBtn = document.getElementById("sigilBtn");
      const coverClosed = document.getElementById("coverClosed");
      const coverOpen = document.getElementById("coverOpen");
      const sparkleLayer = document.getElementById("sparkleLayer");
      const gateFade = document.getElementById("gateFade");

      let busy = false;

      function sparkleBurst() {
        // big gold-green burst (no external libs)
        const rect = sigilBtn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        for (let i = 0; i < 22; i++) {
          const p = document.createElement("div");
          p.className = "spark";
          const angle = Math.random() * Math.PI * 2;
          const dist = 80 + Math.random() * 160;
          const x = Math.cos(angle) * dist;
          const y = Math.sin(angle) * dist;

          p.style.left = cx + "px";
          p.style.top = cy + "px";
          p.style.setProperty("--dx", x + "px");
          p.style.setProperty("--dy", y + "px");
          p.style.animationDelay = (Math.random() * 0.08) + "s";

          sparkleLayer.appendChild(p);
          setTimeout(() => p.remove(), 900);
        }
      }

      function go() {
        // change this if your “landing page” is different
        window.location.href = "app.html";
      }

      sigilBtn.addEventListener("click", () => {
        if (busy) return;
        busy = true;

        sigilBtn.classList.add("sigilPressed");
        sparkleBurst();

        // Cinematic: closed fades, open comes in
        setTimeout(() => {
          coverClosed.classList.remove("isOn");
          coverOpen.classList.add("isOn");
        }, 180);

        // quick “flip” via fade + slight zoom
        setTimeout(() => gateFade.classList.add("fadeOn"), 420);

        // land on app page
        setTimeout(go, 820);
      });
    })();
  </script>
</body>
