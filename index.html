<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1b14" />

  <title>Manic Musings of Chaos</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="stylesheet" href="styles.css" />
</head>

<!-- 🜁 Concealed Side Plane (Summoned Nav) -->
<div id="navScrim" class="navScrim" hidden></div>

<aside id="sidePlane" class="sidePlane" aria-hidden="true">
  <div class="sidePlaneInner" role="navigation" aria-label="Manic Musings Navigation">
    <button class="glyphNav" data-go="app" aria-label="Today">📖</button>
    <button class="glyphNav" data-go="roid" aria-label="Roid Boy">🜂</button>
    <button class="glyphNav" data-go="library" aria-label="Library">🜄</button>
    <button class="glyphNav" data-go="review" aria-label="Year in Review">🜁</button>
    <button class="glyphNav" data-go="settings" aria-label="Settings">⚙︎</button>
  </div>
</aside>

<!-- Invisible swipe-hotzone (NOT at the absolute edge to avoid iOS back-swipe conflicts) -->
<div id="leftHotzone" class="leftHotzone" aria-hidden="true"></div>

<body class="gateBody">
  <main class="gateWrap" role="main">
    <section class="gateCard" aria-label="Manic Musings of Chaos – Entrance">
<div id="view-gate" class="view is-active">
  <!-- KEEP your existing gate HTML exactly as-is inside here -->
</div>
<div id="view-today" class="view" hidden></div>
<div id="view-library" class="view" hidden></div>
<div id="view-review" class="view" hidden></div>
      <!-- STAGE (closed → open) -->
      <div class="gateStage" id="gateStage">
        <img
          id="coverClosed"
          class="gateImg isOn"
          src="cover-closed.png"
          alt="Closed spellbook on a stand"
          draggable="false"
        />
        <img
          id="coverOpen"
          class="gateImg"
          src="cover-stand-open.png"
          alt="Spellbook opened, pages glowing"
          draggable="false"
        />

        <!-- Sigil button (translucent) -->
        <button class="sigilBtn" id="sigilBtn" type="button" aria-label="Cast the opening spell">
          <span class="sigilRing" aria-hidden="true"></span>
          <span class="sigilCore" aria-hidden="true"></span>
 <span class="sigilText" aria-label="Earth Fire Water Air">🜃 🜂 🜄 🜁</span>
        </button>

        <!-- Sparkle burst container -->
        <div class="sparkleLayer" id="sparkleLayer" aria-hidden="true"></div>

        <!-- Subtle fade so the “flip” feels cinematic -->
        <div class="gateFade" id="gateFade" aria-hidden="true"></div>
      </div>

      <!-- Title plate -->
      <div class="gateTitlePlate">
        <div class="gateTitle">MANIC MUSINGS<br/>OF CHAOS</div>
        <div class="gateSub">tell no lies</div>
      </div>

    </section>
  </main>

  <script>
    (function () {
      const sigilBtn = document.getElementById("sigilBtn");
      const coverClosed = document.getElementById("coverClosed");
      const coverOpen = document.getElementById("coverOpen");
      const sparkleLayer = document.getElementById("sparkleLayer");
      const gateFade = document.getElementById("gateFade");

      let busy = false;

      function sparkleBurst() {
        // big gold-green burst (no external libs)
        const rect = sigilBtn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        for (let i = 0; i < 22; i++) {
          const p = document.createElement("div");
          p.className = "spark";
          const angle = Math.random() * Math.PI * 2;
          const dist = 80 + Math.random() * 160;
          const x = Math.cos(angle) * dist;
          const y = Math.sin(angle) * dist;

          p.style.left = cx + "px";
          p.style.top = cy + "px";
          p.style.setProperty("--dx", x + "px");
          p.style.setProperty("--dy", y + "px");
          p.style.animationDelay = (Math.random() * 0.08) + "s";

          sparkleLayer.appendChild(p);
          setTimeout(() => p.remove(), 900);
        }
      }

      function go() {
        // change this if your “landing page” is different
        window.location.hash = "#today";
      }

      sigilBtn.addEventListener("click", () => {
        if (busy) return;
        busy = true;

        sigilBtn.classList.add("sigilPressed");
        sparkleBurst();

        // Cinematic: closed fades, open comes in
        setTimeout(() => {
          coverClosed.classList.remove("isOn");
          coverOpen.classList.add("isOn");
        }, 180);

        // quick “flip” via fade + slight zoom
        setTimeout(() => gateFade.classList.add("fadeOn"), 420);

        // land on app page
        setTimeout(go, 820);
      });
    })();
    
    // ====== Conjured Side Plane (Swipe from left) ======
(function () {
  const sidePlane = document.getElementById("sidePlane");
  const navScrim = document.getElementById("navScrim");
  const leftHotzone = document.getElementById("leftHotzone");

  if (!sidePlane || !navScrim || !leftHotzone) return;

  const openNav = () => {
    document.body.classList.add("navOpen");
    navScrim.hidden = false;
    sidePlane.setAttribute("aria-hidden", "false");
  };

  const closeNav = () => {
    document.body.classList.remove("navOpen");
    navScrim.hidden = true;
    sidePlane.setAttribute("aria-hidden", "true");
  };

  navScrim.addEventListener("click", closeNav);

  // Swipe detection
  let startX = 0, startY = 0, tracking = false;

  leftHotzone.addEventListener("touchstart", (e) => {
    if (!e.touches || e.touches.length !== 1) return;
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    tracking = true;
  }, { passive: true });

  leftHotzone.addEventListener("touchmove", (e) => {
    if (!tracking || !e.touches || e.touches.length !== 1) return;
    const t = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    // Only open if mostly horizontal + strong enough
    if (dx > 55 && Math.abs(dy) < 35) {
      openNav();
      tracking = false;
    }
  }, { passive: true });

  leftHotzone.addEventListener("touchend", () => { tracking = false; }, { passive: true });

  // Glyph navigation actions (map these to your routes/pages)
  sidePlane.addEventListener("click", (e) => {
    const btn = e.target.closest(".glyphNav");
    if (!btn) return;

    const go = btn.getAttribute("data-go");
    closeNav();

    // Adjust these to match your actual pages:
    if (go === "app") window.location.href = "app.html";
    if (go === "roid") {
      // If roid boy is inside app.html, just go there + anchor later
      window.location.href = "app.html#roidboy";
    }
    if (go === "library") window.location.href = "library.html";
    if (go === "review") window.location.href = "review.html";
    if (go === "settings") window.location.href = "library.html#settings"; // placeholder
  });

  // ESC closes (desktop)
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeNav();
  });
})();
    
  </script>
  
  <template id="tpl-today">
  <!-- PASTE ONLY the inside of <body> from app.html here -->
</template>

<template id="tpl-library">
  <!-- PASTE ONLY the inside of <body> from library.html here -->
</template>

<template id="tpl-review">
  <!-- PASTE ONLY the inside of <body> from review.html here -->
</template>

<script>
(function () {
  const views = {
    gate: document.getElementById("view-gate"),
    today: document.getElementById("view-today"),
    library: document.getElementById("view-library"),
    review: document.getElementById("view-review"),
  };

  const templates = {
    today: document.getElementById("tpl-today"),
    library: document.getElementById("tpl-library"),
    review: document.getElementById("tpl-review"),
  };

  const mount = (name) => {
    // hide all
    Object.values(views).forEach(v => { v.hidden = true; v.classList.remove("is-active"); });

    // show target
    const v = views[name] || views.gate;
    v.hidden = false;
    v.classList.add("is-active");

    // lazy-inject template content ONCE
    if (templates[name] && v.childElementCount === 0) {
      v.appendChild(templates[name].content.cloneNode(true));
    }

    // allow your existing JS to re-bind if it uses DOMContentLoaded assumptions
    window.dispatchEvent(new Event("mmoc:viewchange"));
  };

  const route = () => {
    const hash = (location.hash || "#gate").replace("#", "");
    mount(hash);
  };

  window.addEventListener("hashchange", route);
  route();

  // Make "go to app.html" actions route internally instead:
  window.MMOC_ROUTE = (hash) => { location.hash = "#" + hash; };

})();
</script>
  
</body>
