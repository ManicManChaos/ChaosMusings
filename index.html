<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050806" />
  <title>Manic Musings of Chaos</title>

  <!-- Icons -->
  <link rel="icon" href="assets/icons/favicon.png" />
  <link rel="icon" sizes="16x16" href="assets/icons/favicon-16.png" />
  <link rel="icon" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />

  <!-- Clean-path -> hash (kept minimal; no visible text) -->
  <script>
    (function () {
      if (location.hash) return;
      var p = (location.pathname || '/').replace(/\/$/, '').toLowerCase();
      if (!p) return;
      var map = {
        '/today': '#today',
        '/library': '#library',
        '/review': '#review',
        '/roidboy': '#roidboy',
        '/year': '#review',
        '/app': '#today',
        '/': '#today'
      };
      location.replace(map[p] ? ('/' + map[p]) : '/#today');
    })();
  </script>
</head>

<body class="gateBody">
  <!-- Swipe hotzone to summon nav plane -->
  <div class="leftHotzone" aria-hidden="true"></div>

  <!-- Scrim + Side Plane -->
  <div class="navScrim" hidden aria-hidden="true"></div>
  <aside class="sidePlane" aria-label="Navigation">
    <div class="sidePlaneInner">
      <button class="glyphNav" type="button" data-go="today" aria-label="Today">📖</button>
      <button class="glyphNav" type="button" data-go="library" aria-label="Library">🗄️</button>
      <button class="glyphNav" type="button" data-go="review" aria-label="Year">🜂</button>
      <button class="glyphNav" type="button" data-go="roidboy" aria-label="Roid Boy">🏋️</button>
      <button class="glyphNav" type="button" data-go="settings" aria-label="Settings">⚙︎</button>
    </div>
  </aside>

  <!-- =====================
       GATE (INTRO)
       ===================== -->
  <main class="gateWrap" id="gateWrap" role="main" aria-label="Entrance">
    <section class="gateCard" id="gateCard">
      <div class="gateStage" id="gateStage" aria-label="Spellbook gate">
        <img
          id="coverClosed"
          class="gateImg isOn"
          src="assets/covers/cover-closed.png"
          alt=""
          draggable="false"
        />

        <img
          id="coverOpen"
          class="gateImg"
          src="assets/covers/cover-stand-open.png"
          alt=""
          draggable="false"
        />

        <button class="sigilBtn" id="sigilBtn" type="button" aria-label="Open">
          <span class="sigilRing" aria-hidden="true"></span>
          <span class="sigilCore" aria-hidden="true"></span>
          <span class="sigilText" aria-hidden="true">▽ △ ▽ △</span>
        </button>

        <div class="sparkleLayer" id="sparkleLayer" aria-hidden="true"></div>
        <div class="gateFade" id="gateFade" aria-hidden="true"></div>
      </div>

      <!-- Title plate: keep the vibe, minimal visible words allowed here -->
      <div class="gateTitlePlate" aria-hidden="true">
        <div class="gateTitle">MANIC MUSINGS<br/>OF CHAOS</div>
        <div class="gateSub">tell no lies</div>
      </div>
    </section>
  </main>

  <!-- =====================
       APP SHELL
       ===================== -->
  <main class="appShell" id="appShell" hidden>
    <!-- No hamburger. Swipe-only. -->
    <header class="topbar" aria-label="Top bar">
      <div class="brand" aria-hidden="true">MANIC MUSINGS</div>

      <div class="topbarRight" aria-label="Status">
        <!-- glyph-only status seal (no text) -->
        <span class="statusSeal" id="statusSeal" aria-label="Status">◉</span>
      </div>
    </header>

    <div class="container">

      <!-- VIEW: TODAY -->
      <section class="view card" id="view-today">
        <!-- Day / Date / Time pills (no labels) -->
        <div class="pillsRow" aria-label="Timestamp">
          <span class="pill" id="pillDay" aria-label="Day">◈</span>
          <span class="pill" id="pillDate" aria-label="Date">◈</span>
          <span class="pill" id="pillTime" aria-label="Time">◈</span>
        </div>

        <!-- ZONE 1 -->
        <section class="zone" aria-label="Assessment">
          <div class="zoneHead">
            <h2 class="zoneTitle">THE ASSESSMENT</h2>
            <span class="floatTools" aria-label="Tools">
              <button type="button" class="glyphBtn" data-act="float" aria-label="Float/Dock">✧</button>
              <button type="button" class="glyphBtn" data-act="pin" aria-label="Pin">⌂</button>
              <button type="button" class="glyphBtn" data-act="spark" aria-label="Spark">✺</button>
              <button type="button" class="glyphBtn" data-act="reset" aria-label="Reset">↺</button>
            </span>
          </div>

          <div class="assessmentCard">
            <div class="titleLine">
              <label class="sr-only" for="entryTitle">Title</label>
              <input id="entryTitle" type="text" class="titleInput" autocomplete="off" />
            </div>

            <div class="grid2">
              <div class="field">
                <label class="sr-only" for="entryLocation">Location</label>
                <input id="entryLocation" type="text" autocomplete="off" />
              </div>
              <div class="field">
                <label class="sr-only" for="entryIntent">Intent</label>
                <input id="entryIntent" type="text" autocomplete="off" />
              </div>
            </div>

            <div class="grid3">
              <div class="field">
                <label class="sr-only" for="entryMood">Mood</label>
                <select id="entryMood">
                  <option value=""></option>
                  <option>SOFT</option>
                  <option>LOCKED IN</option>
                  <option>CHAOTIC GOOD</option>
                  <option>UNBOTHERED</option>
                  <option>SPICY</option>
                </select>
              </div>
              <div class="field">
                <label class="sr-only" for="entryEra">Era</label>
                <select id="entryEra">
                  <option value=""></option>
                  <option>GLOW-UP</option>
                  <option>VILLAIN ARC</option>
                  <option>ROM-COM</option>
                  <option>WIZARD ERA</option>
                </select>
              </div>
              <div class="field">
                <label class="sr-only" for="entrySingle">Singleness</label>
                <select id="entrySingle">
                  <option value=""></option>
                  <option>BOOKED</option>
                  <option>BROWSING</option>
                  <option>UNCLAIMED TREASURE</option>
                  <option>DO NOT APPROACH</option>
                </select>
              </div>
            </div>

            <div class="grid2">
              <div class="field">
                <label class="sr-only" for="entryWord">Word</label>
                <input id="entryWord" type="text" autocomplete="off" />
              </div>
              <div class="field">
                <label class="sr-only" for="entryDayTag">Day</label>
                <input id="entryDayTag" type="text" autocomplete="off" />
              </div>
            </div>
          </div>
        </section>

        <!-- ZONE 2 -->
        <section class="zone" aria-label="Context and Proof">
          <div class="zoneHead">
            <h2 class="zoneTitle">THE CONTEXT &amp; THE PROOF</h2>
            <span class="floatTools" aria-label="Tools">
              <button type="button" class="glyphBtn" data-act="float" aria-label="Float/Dock">✧</button>
              <button type="button" class="glyphBtn" data-act="pin" aria-label="Pin">⌂</button>
              <button type="button" class="glyphBtn" data-act="spark" aria-label="Spark">✺</button>
              <button type="button" class="glyphBtn" data-act="reset" aria-label="Reset">↺</button>
            </span>
          </div>

          <div class="momentsWrap" id="momentsWrap">
            <button type="button" class="addMomentBtn" id="addMomentBtn" aria-label="Add moment">＋</button>
            <div class="momentsList" id="momentsList"></div>
          </div>
        </section>

        <!-- ZONE 3 -->
        <section class="zone" aria-label="Summation">
          <div class="zoneHead">
            <h2 class="zoneTitle">THE SUMMATION</h2>
            <span class="floatTools" aria-label="Tools">
              <button type="button" class="glyphBtn" data-act="float" aria-label="Float/Dock">✧</button>
              <button type="button" class="glyphBtn" data-act="pin" aria-label="Pin">⌂</button>
              <button type="button" class="glyphBtn" data-act="spark" aria-label="Spark">✺</button>
              <button type="button" class="glyphBtn" data-act="reset" aria-label="Reset">↺</button>
            </span>
          </div>

          <div class="writerCard">
            <div class="leadLine" aria-hidden="true">
              <span class="leadGlyph">⟡</span>
              <span class="leadGlyph">⟡</span>
            </div>

            <label class="sr-only" for="entryConfession">Writing</label>
            <textarea id="entryConfession" rows="10"></textarea>

            <div class="actions">
              <!-- wax seal save: glyph only -->
              <button class="sealBtn" id="saveEntryBtn" type="button" aria-label="Save">⟠</button>
              <span class="saveGlow" id="saveGlow" aria-hidden="true"></span>
            </div>
          </div>
        </section>

      </section>

      <!-- VIEW: LIBRARY -->
      <section class="view card" id="view-library" hidden aria-label="Library">
        <div class="viewCap" aria-hidden="true">🗄️</div>
        <div class="list" id="libraryList"></div>
      </section>

      <!-- VIEW: REVIEW -->
      <section class="view card" id="view-review" hidden aria-label="Review">
        <div class="viewCap" aria-hidden="true">🜂</div>
        <div class="bar"><div id="cycleFill"></div></div>
      </section>

      <!-- VIEW: ROID BOY -->
      <section class="view card" id="view-roidboy" hidden aria-label="Roid Boy">
        <div class="viewCap" aria-hidden="true">🏋️</div>
        <div class="actions">
          <button class="sealBtn" id="roidOpen" type="button" aria-label="Summon">⟠</button>
        </div>
      </section>

      <!-- VIEW: SETTINGS -->
      <section class="view card" id="view-settings" hidden aria-label="Settings">
        <div class="viewCap" aria-hidden="true">⚙︎</div>
      </section>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
