<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06110b"/>
      <stop offset="1" stop-color="#0b1f14"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b6b45"/>
      <stop offset="1" stop-color="#0f2f22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2d38a"/>
      <stop offset="1" stop-color="#d6b15a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ffe6a0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffe6a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="600" cy="540" r="420" fill="url(#glow)"/>

  <!-- book -->
  <rect x="260" y="180" width="680" height="820" rx="46" fill="url(#book)" stroke="url(#gold)" stroke-width="8"/>
  <rect x="310" y="205" width="90" height="770" rx="28" fill="#ffffff" opacity="0.06"/>
  <rect x="340" y="850" width="520" height="120" rx="28" fill="#000" opacity="0.25" stroke="#d6b15a" stroke-opacity="0.35" stroke-width="2"/>

  <text x="600" y="905" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-weight="900" font-size="64" letter-spacing="10" fill="#f2d38a">
    MANIC
  </text>
  <text x="600" y="960" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-weight="900" font-size="44" letter-spacing="8" fill="#f2d38a" opacity="0.95">
    MUSINGS
  </text>
</svg>